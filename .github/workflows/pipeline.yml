name: PAwCHO-Zadanie2

# WYZWALACZE (Triggery)
on:
  push:
    branches:
      - 'main'
    tags:
      - 'v*' # Łańcuch ruszy tylko, gdy zostanie nadany tag (np. v1.0.0) 
  workflow_dispatch: # Pozwala na ręczne kliknięcie "Run workflow" na GitHubie

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # Zmienna systemowa

jobs:
  build-and-push:
    name: Build, Scan CVE and Push
    runs-on: ubuntu-latest # Darmowy runner Linuxowy

    # Zezwolenia potrzebne dla GitHub Token do zapisu w rejestrze ghcr.io
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Pobieranie kodu źródłowego na runnera 
      - name: Checkout repository
        uses: actions/checkout@v6

      # 2. Generowanie tagów dla obrazu
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: latest=false
          tags: |
            type=sha,priority=100,prefix=sha-,format=short 
            type=semver,priority=200,pattern={{version}}

      # 3. Emulacja środowisk sprzętowych dla ARM64 
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      # 4. Instalacja silnika Buildx wspierającego cache i multi-arch
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # 5. Logowanie do DockerHuba (Tylko w celu składowania CACHE)
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }} 
          password: ${{ secrets.DOCKERHUB_TOKEN }} 

      # 6. Logowanie do GHCR (GitHub Container Registry)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} 

      # 7. Budowanie wersji testowej TYLKO dla skanera
      - name: Build local image for scanning
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true # Wgrywa obraz prosto do demona na runnerze, aby skaner go zobaczył
          tags: lokalny-test:latest
          # Pobieranie z DockerHuba starego cache'a, żeby skrócić czas budowania
          cache-from: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/pawcho-zadanie2-cache:max

      # 8. Skanowanie podatności CVE (Skaner Trivy)
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'lokalny-test:latest'
          format: 'table'
          exit-code: '1' # Jeśli znajdzie błędy, PRZERWANIE całego workflow
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH' # Skanuje tylko w poszukiwaniu "wysokich" i "krytycznych" błędów

      # 9. Budowanie docelowe (Multi-arch) i wypychanie do GHCR (Wykona się, tylko jeśli Trivy nie znalazł błędów)
      - name: Build and push multi-arch image
        uses: docker/build-push-action@v7 
        with:
          context: .
          platforms: linux/amd64,linux/arm64 
          push: true 
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Zarządzanie cache na DockerHub  
          cache-from: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/pawcho-zadanie2-cache:max
          cache-to: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/pawcho-zadanie2-cache:max,mode=max